services:
  asr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asr_whisper
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "${WHISPER_PORT:-8021}:8000"
    volumes:
      - ./models:/app/models
      - ./audio:/app/audio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    command: ["uvicorn", "whisper_fastapi:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - ADF
networks:
  ADF:
    driver: bridge
    name: adf_network
    external: true